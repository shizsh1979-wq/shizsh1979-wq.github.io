    <style>
        /* ===== СТИЛИ (ОСТАЛИСЬ БЕЗ ИЗМЕНЕНИЙ) ===== */

        .notification-toast {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            background: #5bb4d4;
            border: 2px solid white;
            border-radius: 50px;
            padding: 10px 20px;

            z-index: 1000;

            color: white;

        .notification-toast.top { top: 20px; animation: slideDown 0.3s ease-out forwards; }
        .notification-toast.bottom { bottom: 20px; animation: slideUp 0.3s ease-out forwards; }
        .notification-toast.center { top: 50%; transform: translate(-50%, -50%); animation: popIn 0.3s ease-out forwards; white-space: normal; max-width: 280px; text-align: center; padding: 15px 25px; font-size: 1rem; }
        
        @keyframes slideDown { 0% { opacity: 0; transform: translateX(-50%) translateY(-50px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes slideUp { 0% { opacity: 0; transform: translateX(-50%) translateY(50px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        
        body {
            overflow: hidden;

<body>
<div id="appRoot"></div>
<div class="copyright">© Дмитрий Хайбулин | <a href="mailto:kayfull.in@yandex.ru">kayfull.in@yandex.ru</a></div>
<script>
// ===== ПЕРЕМЕННЫЕ ДЛЯ ПРЕДЗАГРУЗКИ РЕКЛАМЫ =====
let preloadedRewardedAd = null;      // Храним предзагруженную рекламу
let isLoadingRewardedAd = false;     // Флаг, чтобы не загружать несколько раз одновременно

// ===== ФУНКЦИЯ ПРЕДЗАГРУЗКИ РЕКЛАМЫ (вызывается автоматически) =====
function preloadRewardedAd() {
    // Если реклама уже загружена или грузится — ничего не делаем
    if (preloadedRewardedAd || isLoadingRewardedAd) return;
    
    if (typeof Ya === 'undefined' || !Ya.RewardedAd) {
        console.log('❌ Яндекс Реклама не загружена');
        return;
    }
    
    isLoadingRewardedAd = true;
    console.log('📡 Начинаем предзагрузку рекламы...');
    
    const ad = new Ya.RewardedAd('R-M-19285274-1');
    
    ad.on('load', () => {
        console.log('✅ Реклама предзагружена!');
        preloadedRewardedAd = ad;
        isLoadingRewardedAd = false;
    });
    
    ad.on('error', (error) => {
        console.error('❌ Ошибка предзагрузки рекламы:', error);
        isLoadingRewardedAd = false;
        preloadedRewardedAd = null;
        // Если не загрузилось — пробуем снова через 30 секунд
        setTimeout(() => { preloadRewardedAd(); }, 30000);
    });
    
    ad.load();
}

// ===== ФУНКЦИЯ ПОКАЗА РЕКЛАМЫ (ИСПРАВЛЕНА) =====
function showRewardedAd() {
    // Если есть предзагруженная реклама — показываем её мгновенно
    if (preloadedRewardedAd) {
        const ad = preloadedRewardedAd;
        preloadedRewardedAd = null; // Очищаем, чтобы не показать дважды
        
        ad.on('rewarded', () => {
            addLives(3);
            showNotification('🎉 +3 жизни! Спасибо за просмотр!', '🎁', 'center', 2500);
            renderFull();
            // После показа — предзагружаем новую рекламу
            preloadRewardedAd();
        });
        
        ad.on('close', () => {
            console.log('Реклама закрыта');
            renderFull();
        });
        
        ad.on('error', (error) => {
            console.error('Ошибка показа рекламы:', error);
            showNotification('❌ Реклама не загрузилась. Попробуйте позже.', '⚠️', 'center', 2000);
            renderFull();
            // Пробуем предзагрузить заново
            preloadRewardedAd();
        });
        
        ad.show();
    } 
    // Если предзагруженной рекламы нет — показываем старым способом с задержкой
    else if (typeof Ya !== 'undefined' && Ya.showRewardedAd) {
        console.log('⚠️ Предзагруженной рекламы нет, загружаем сейчас...');
        Ya.showRewardedAd({
            blockId: 'R-M-19285274-1',
            onRewarded: () => {
                addLives(3);
                showNotification('🎉 +3 жизни! Спасибо за просмотр!', '🎁', 'center', 2500);
                renderFull();
            },
            onError: (error) => {
                console.error('Ошибка рекламы:', error);
                showNotification('❌ Реклама не загрузилась. Попробуйте позже.', '⚠️', 'center', 2000);
                renderFull();
            }
        });
    } else {
        showNotification('⚠️ Реклама временно недоступна', '⚠️', 'center', 2000);
    }
}

// ===== АВТОРСКИЕ ПРАВА И ПРОЧАЯ ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ) =====
window.addEventListener('load', function() {
    setTimeout(function() { window.scrollTo(0, 1); }, 0);
    // ЗАПУСКАЕМ ПРЕДЗАГРУЗКУ РЕКЛАМЫ ПРИ СТАРТЕ ИГРЫ
    setTimeout(() => { preloadRewardedAd(); }, 2000);
});

console.log("%c© MathMasters | Автор: Дмитрий Хайбулин", "color:#3a9bc0;font-size:14px;font-weight:bold");

// ======================= НАСТРОЙКИ =======================
let playerNickname = localStorage.getItem('playerNickname') || "Игрок";
let difficulty = localStorage.getItem('gameDifficulty') || "medium";
let selectedPet = localStorage.getItem('selectedPet') || "cat";
let soundEnabled = localStorage.getItem('soundEnabled') !== "false";
let musicEnabled = localStorage.getItem('musicEnabled') !== "false";
let musicUnlocked = false;
let pendingAnswer = false;

const pets = {
    cat: { name: "Ум-мяу", emoji: "🐱", price: 0 },
    panda: { name: "Панда", emoji: "🐼", price: 3 },
    dino: { name: "Динозаврик", emoji: "🦕", price: 5 }
};

function showNicknameModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-content"><h3>Введите ваш никнейм</h3><input type="text" id="nicknameInput" maxlength="15" placeholder="${playerNickname}" value="${playerNickname}"><button id="saveNicknameBtn" style="background:#ffaa44; color:#2a6a8a; border:none; padding:8px 20px; border-radius:40px; margin-top:10px; font-weight:bold;">Сохранить</button></div>`;
    document.body.appendChild(modal);
    const input = modal.querySelector('#nicknameInput');
    const saveBtn = modal.querySelector('#saveNicknameBtn');
    saveBtn.onclick = () => {
        let newName = input.value.trim();
        if (newName.length > 15) newName = newName.slice(0,15);
        if (newName === "") newName = "Игрок";
        playerNickname = newName;
        localStorage.setItem('playerNickname', playerNickname);
        modal.remove();
        showNotification(`Никнейм изменён на ${playerNickname}`, "✏️", "top", 2000);
        renderFull();
    };
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveBtn.click(); });
    input.focus();
}

let bgMusic = null;
function initMusic() { if (bgMusic) return; bgMusic = new Audio(); bgMusic.loop = true; bgMusic.volume = 0.2; bgMusic.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"; }
function unlockMusic() { if (musicUnlocked) return; musicUnlocked = true; if (bgMusic && musicEnabled) bgMusic.play().catch(e => console.log); }
function startMusicOnFirstTouch() {
    document.body.addEventListener('touchstart', function once() { unlockMusic(); document.body.removeEventListener('touchstart', once); });
    document.body.addEventListener('click', function once() { unlockMusic(); document.body.removeEventListener('click', once); });
}
function toggleMusic() {
    musicEnabled = !musicEnabled;
    localStorage.setItem('musicEnabled', musicEnabled);
    if (bgMusic) { if (musicEnabled && musicUnlocked) bgMusic.play().catch(e => {}); else if (!musicEnabled) bgMusic.pause(); }
    else if (musicEnabled) { initMusic(); if (musicUnlocked) bgMusic.play().catch(e => {}); }
    showNotification(musicEnabled ? "Музыка включена" : "Музыка выключена", musicEnabled ? "🎵" : "🔇", "top", 1500);
}

let notificationQueue = [];
let isShowingNotification = false;
function showNotification(message, emoji, zone = "top", duration = 2500) {
    notificationQueue.push({ message, emoji, zone, duration });
    processNotificationQueue();
}
function processNotificationQueue() {
    if (isShowingNotification || notificationQueue.length === 0) return;
    isShowingNotification = true;
    const { message, emoji, zone, duration } = notificationQueue.shift();
    const toast = document.createElement('div');
    toast.className = `notification-toast ${zone}`;
    toast.innerHTML = `<span style="font-size:1.3rem; margin-right:8px">${emoji}</span> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = "fadeOut 0.3s ease-out forwards";
        setTimeout(() => { toast.remove(); isShowingNotification = false; processNotificationQueue(); }, 300);
    }, duration);
}

function playYesSound() { if (!soundEnabled) return; const utterance = new SpeechSynthesisUtterance("Yes"); utterance.lang = "en-US"; utterance.rate = 1.2; utterance.volume = 0.8; window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance); }
function playOopsSound() { if (!soundEnabled) return; const utterance = new SpeechSynthesisUtterance("Ой"); utterance.lang = "ru-RU"; utterance.rate = 1.1; utterance.volume = 0.8; window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance); }

const cheerPhrases = ["Давай-давай!", "Ты можешь лучше!", "Ты просто супер!", "Ты математик!", "Ты лучше всех!", "Ты вундеркинд!", "Ты супер мозг!"];
let cheerIndex = 0, cheerInterval = null;
function playNextCheer() { if (!soundEnabled) return; const utterance = new SpeechSynthesisUtterance(cheerPhrases[cheerIndex % cheerPhrases.length]); utterance.lang = "ru-RU"; utterance.rate = 0.95; utterance.volume = 0.65; window.speechSynthesis.speak(utterance); cheerIndex++; }
function startCheerInterval() { if (cheerInterval) clearInterval(cheerInterval); cheerInterval = setInterval(playNextCheer, 20000); }
function stopCheerInterval() { if (cheerInterval) clearInterval(cheerInterval); }

function playSound(type) {
    if (!soundEnabled) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        if (type === "bell") {
            osc.frequency.value = 1200; gain.gain.value = 0.12; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35); osc.stop(ctx.currentTime + 0.3);
            const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain(); osc2.connect(gain2); gain2.connect(ctx.destination); osc2.frequency.value = 1800; gain2.gain.value = 0.06; osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3); osc2.stop(ctx.currentTime + 0.25);
        } else if (type === "victory") {
            [880, 1100, 1320].forEach((freq, i) => { const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = freq; g.gain.value = 0.1; o.start(ctx.currentTime + i * 0.12); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.12 + 0.35); o.stop(ctx.currentTime + i * 0.12 + 0.35); });
        } else if (type === "reward") {
            [660, 880, 1320].forEach((freq, i) => { const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = freq; g.gain.value = 0.08; o.start(ctx.currentTime + i * 0.1); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.1 + 0.3); o.stop(ctx.currentTime + i * 0.1 + 0.3); });
        } else if (type === "achievement") {
            [523, 659, 784].forEach((freq, i) => { const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = freq; g.gain.value = 0.12; o.start(ctx.currentTime + i * 0.1); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.1 + 0.35); o.stop(ctx.currentTime + i * 0.1 + 0.35); });
        }
    } catch(e) {}
}

// ======================= СИСТЕМА ЖИЗНЕЙ =======================
let lives = 9;
let lastLifeUpdate = localStorage.getItem('lastLifeUpdate') || Date.now();
let nextLifeTime = localStorage.getItem('nextLifeTime') || null;

function updateLivesDisplay() {
    const livesContainer = document.querySelector('.lives-container');
    if (livesContainer) {
        let hearts = '';
        for (let i = 0; i < lives; i++) hearts += '❤️ ';
        for (let i = lives; i < 9; i++) hearts += '🖤 ';
        livesContainer.innerHTML = hearts.trim() || '❤️';
    }
    localStorage.setItem('lives', lives);
    localStorage.setItem('lastLifeUpdate', lastLifeUpdate);
}

function restoreLivesOverTime() {
    const now = Date.now();
    const storedLives = parseInt(localStorage.getItem('lives'));
    if (!isNaN(storedLives)) lives = storedLives;
    if (nextLifeTime && now >= parseInt(nextLifeTime)) {
        if (lives < 9) {
            lives = Math.min(9, lives + 1);
            localStorage.setItem('lives', lives);
            nextLifeTime = now + 3600000;
            localStorage.setItem('nextLifeTime', nextLifeTime);
        } else {
            nextLifeTime = null;
            localStorage.setItem('nextLifeTime', null);
        }
    }
    if (lives < 9 && !nextLifeTime) {
        nextLifeTime = now + 3600000;
        localStorage.setItem('nextLifeTime', nextLifeTime);
    }
    updateLivesDisplay();
}

function loseLife() {
    if (lives > 0) {
        lives--;
        if (lives === 0) {
            nextLifeTime = Date.now() + 3600000;
            localStorage.setItem('nextLifeTime', nextLifeTime);
            showNotification("❤️ Жизни закончились! Смотри рекламу или жди восстановления", "⚠️", "center", 3000);
        }
        localStorage.setItem('lives', lives);
        updateLivesDisplay();
        return true;
    }
    return false;
}

function addLives(count) {
    lives = Math.min(9, lives + count);
    if (lives < 9) { nextLifeTime = Date.now() + 3600000; localStorage.setItem('nextLifeTime', nextLifeTime); }
    else { nextLifeTime = null; localStorage.setItem('nextLifeTime', null); }
    localStorage.setItem('lives', lives);
    updateLivesDisplay();
    showNotification(`+${count} жизни! ❤️`, "🎁", "center", 2000);
    renderFull();
}

function updateBotsScores() {

    }
}

function refreshBotNames() {
    const available = [...ALL_BOT_NAMES];
    botsList.forEach(b => { const i = available.indexOf(b.name); if(i!==-1) available.splice(i,1); });
    for(let i=0; i<2 && available.length; i++) { const idx = Math.floor(Math.random() * botsList.length); const newIdx = Math.floor(Math.random() * available.length); botsList[idx].name = available[newIdx]; available.splice(newIdx,1); }
    botsList.sort((a,b) => b.elo - a.elo);
    updateLeaderboardAndStats();
}

function initBots() {
    let shuffled = [...ALL_BOT_NAMES].sort(() => Math.random() - 0.5);
    let bots = [];
    for (let i = 0; i < 7; i++) { let lvl = Math.max(1, game.level + Math.floor(Math.random() * 5) - 2); bots.push({ name: shuffled[i], level: lvl, elo: Math.max(300, game.elo + (Math.random() * 100 - 50)), rank: getRankTitle(lvl) }); }
    return bots.sort((a,b) => b.elo - a.elo);
}

function getRankTitle(lvl) { if(lvl<=4) return "Новичок 🟢"; if(lvl<=9) return "Ученик 📘"; if(lvl<=19) return "Знаток 🟡"; if(lvl<=34) return "Эрудит 🔵"; if(lvl<=49) return "Мастер 🟣"; if(lvl<=74) return "Профессор 🏅"; if(lvl<=99) return "Гений 🔥"; return "Легенда 👑"; }

let adaptiveMultiplier = 1.0;
function adjustDifficulty(correct) { if (correct) adaptiveMultiplier = Math.min(2.0, adaptiveMultiplier + 0.1); else adaptiveMultiplier = Math.max(0.5, adaptiveMultiplier - 0.15); }

function generateMathQuestion() {
    let maxNum = 12 + Math.floor(game.level * 1.2);
    if (difficulty === "easy") maxNum = Math.min(maxNum, 25);
    else if (difficulty === "hard") maxNum = Math.min(maxNum * 1.5, 200);
    maxNum = Math.floor(maxNum * adaptiveMultiplier);
    maxNum = Math.min(280, maxNum);
    let useMul = (difficulty !== "easy") && (game.level >= 4);
    let useDiv = (difficulty === "hard" && game.level >= 6) || (game.level >= 10);
    let useThree = (difficulty === "hard" && game.level >= 8) || (game.level >= 12);
    let useNegative = (difficulty === "hard" && game.level >= 15);
    
    if (useThree && Math.random() > 0.5) {
        let ops = ['+', '-']; if(useMul) ops.push('×'); if(useDiv) ops.push('÷');
        let op1 = ops[Math.floor(Math.random() * ops.length)];
        let op2 = ops[Math.floor(Math.random() * ops.length)];
        let a = Math.floor(Math.random() * maxNum/2)+3;
        let b = Math.floor(Math.random() * maxNum/2)+3;
        let c = Math.floor(Math.random() * maxNum/2)+3;
        let answer;
        if(op1==='+' && op2==='+') answer = a+b+c;
        else if(op1==='+' && op2==='-') answer = a+b-c;
        else if(op1==='×' && op2==='+') answer = (a*b)+c;
        else if(op1==='×' && op2==='-') answer = (a*b)-c;
        else answer = a+b-c;
        if(useNegative && Math.random()>0.7) answer = -answer;
        return { text: `${a} ${op1} ${b} ${op2} ${c}`, answer: answer.toString() };
    }
    let ops = ['+', '-']; if(useMul) ops.push('×'); if(useDiv) ops.push('÷');
    let op = ops[Math.floor(Math.random() * ops.length)];
    let a = Math.floor(Math.random() * maxNum) + 1;
    let b = Math.floor(Math.random() * maxNum) + 1;
    let answer;
    if(op === '+') answer = a + b;
    else if(op === '-') { if(a<b) [a,b] = [b,a]; answer = a - b; }
    else if(op === '×') answer = a * b;
    else { b = Math.max(2,b); answer = Math.floor(Math.random() * 20) + 1; a = b * answer; }
    if(useNegative && Math.random()>0.8) answer = -answer;
    return { text: `${a} ${op} ${b}`, answer: answer.toString() };
}

function handleAnswer(userAnswer) {
    if (pendingAnswer) return false;
    if (lives <= 0) { 
        showNotification("Нет жизней! Смотри рекламу или жди восстановления", "⚠️", "center", 2000); 
        return false; 
    }
    pendingAnswer = true;
    
    let correct = (userAnswer.trim() === game.currentQ?.answer);
    
    if (correct) {
        playYesSound();
        let timeSpent = (Date.now() - game.lastAnswerTime) / 1000;
        game.totalCorrect++; game.streak++; game.totalScore += 10; game.mathCorrect++;
        if(game.streak === 5) playSound("achievement");
        updateQuest("Решить 20 примеров");
        if(timeSpent < 3 && !achievements.speed_demon) unlockAchievement("speed_demon");
        adjustDifficulty(true);
        
        if(game.streak >= 10) {
            game.level++; if(game.level > game.highestLevel) game.highestLevel = game.level;
            game.streak = 0; game.totalScore += 50;
            playSound("victory");
            showNotification(`УРОВЕНЬ ${game.level}! +50 очков`, "🎉", "center", 2500);
            updateQuest("Повысить уровень 3 раза");
            if(game.level >= 5 && !achievements.first_steps) unlockAchievement("first_steps");
            if(game.level >= 30 && !achievements.marathoner) unlockAchievement("marathoner");
            updateCupsAndMedals();
        }
        
        game.sessionCounter++;
        if(game.sessionCounter >= 8) {
            let pos = Math.floor(Math.random() * 3) + 1;
            let delta = pos===1?25:(pos===2?12:5);
            game.elo = Math.max(300, game.elo + delta);
            if(pos===1) game.winTop3Count++;
            game.sessionCounter = 0;
            playSound("bell");
            showNotification(`${pos===1?"🥇":pos===2?"🥈":"🥉"} ${pos} место! +${delta} рейтинга`, "🏆", "center", 2500);
            updateQuest("Выиграть 2 турнира");
            if(game.winTop3Count >= 3 && !achievements.invincible) unlockAchievement("invincible");
            botsList = initBots(); refreshBotNames();
        }
        if(game.totalCorrect >= 50 && !achievements.iron_will) unlockAchievement("iron_will");
        if(game.mathCorrect >= 80 && !achievements.math_sniper) unlockAchievement("math_sniper");
        game.lastAnswerTime = Date.now();
        
        game.currentQ = generateMathQuestion();
        updateQuestionAndField();
        updateBotsScores();
        
        pendingAnswer = false;
        return true;
        
    } else {
        playOopsSound();
        if(difficulty !== "easy") game.totalScore = Math.max(0, game.totalScore - 5);
        game.streak = 0;
        adjustDifficulty(false);
        loseLife();
        showNotification(`Неправильно! −1 жизнь ❤️ Осталось: ${lives}`, "❌", "bottom", 1500);
        
        game.currentQ = generateMathQuestion();
        updateQuestionAndField();
        updateBotsScores();
        
        pendingAnswer = false;
        return false;
    }
}

function updateCupsAndMedals() {
    let lvl = game.highestLevel;
    let cups = [...game.cups];
    if(lvl>=10 && !cups.includes('bronze')) cups.push('bronze');
    if(lvl>=20 && !cups.includes('silver')) cups.push('silver');
    if(lvl>=30 && !cups.includes('gold')) cups.push('gold');
    if(lvl>=40 && !cups.includes('platinum')) cups.push('platinum');
    if(lvl>=50 && !cups.includes('royal')) cups.push('royal');
    if(lvl>=60 && !cups.includes('legendary')) cups.push('legendary');
    game.cups = cups;
    let medals = [...game.medals];
    if(game.highestLevel>=5 && !medals.includes('first_steps')) medals.push('first_steps');
    if(game.totalCorrect>=50 && !medals.includes('iron_will')) medals.push('iron_will');
    if(game.mathCorrect>=80 && !medals.includes('math_sniper')) medals.push('math_sniper');
    if(game.highestLevel>=30 && !medals.includes('marathoner')) medals.push('marathoner');
    if(game.winTop3Count>=3 && !medals.includes('invincible')) medals.push('invincible');
    game.medals = medals;
    Object.keys(achievements).forEach(a => { if(!medals.includes(a) && achievements[a]) medals.push(a); });
    game.medals = medals;
    localStorage.setItem('gameData', JSON.stringify({level:game.level, elo:game.elo, totalCorrect:game.totalCorrect, highestLevel:game.highestLevel, cups:game.cups, medals:game.medals, mathCorrect:game.mathCorrect, winTop3Count:game.winTop3Count}));
}

                        <span>${achievements[id]?'✅':'❌'}</span>
                     </div>
                     <div style="font-size: 0.7rem; color: #e0e0e0; margin-top: -5px; margin-bottom: 8px; padding-left: 10px;">${ach.desc}</div>`; 
        }
        html += `</div></div>`;
        root.innerHTML = html;
        document.getElementById('backBtn')?.addEventListener('click',()=>{ currentScreen='game'; renderFull(); });
    } else if(currentScreen === 'stats') {
        let stats = JSON.parse(localStorage.getItem('statsHistory')) || [];
        stats.push({date:new Date().toDateString(), level:game.level, elo:game.elo, correct:game.totalCorrect});
        if(stats.length>10) stats.shift();
        localStorage.setItem('statsHistory',JSON.stringify(stats));
        let html = `<div class="game-card"><div class="top-bar"><div>📊 СТАТИСТИКА</div><button class="badge" id="backBtn">◀ НАЗАД</button></div><div class="stats-screen"><h3>Прогресс</h3><ul>`;
        for(let s of stats.slice(-7)) html += `<li>${s.date}: Ур.${s.level}, Рейтинг:${s.elo}, Ответов:${s.correct}</li>`;
        html += `</ul><h3>Текущий уровень сложности: ${difficulty==='easy'?'Лёгкий':difficulty==='medium'?'Средний':'Сложный'}</h3><h3>Адаптивный множитель: ${adaptiveMultiplier.toFixed(2)}x</h3></div></div>`;
        root.innerHTML = html;
        document.getElementById('backBtn')?.addEventListener('click',()=>{ currentScreen='game'; renderFull(); });
    }
    if (lives < 9) { const remaining = getTimeToNextLife(); if (remaining === 0) { restoreLivesOverTime(); renderFull(); } }
}

function startBotUpdateInterval() { if (botUpdateInterval) clearInterval(botUpdateInterval); botUpdateInterval = setInterval(() => { if (currentScreen === 'game') updateBotsScores(); }, 5000); }
function stopBotUpdateInterval() { if (botUpdateInterval) clearInterval(botUpdateInterval); }
function startLifeRestoreChecker() { if (lifeRestoreInterval) clearInterval(lifeRestoreInterval); lifeRestoreInterval = setInterval(() => { restoreLivesOverTime(); if (currentScreen === 'game') renderFull(); }, 60000); }

function loadGame() {
    try { const saved = localStorage.getItem('gameData'); if(saved) { let d = JSON.parse(saved); for(let k in d) if(game.hasOwnProperty(k)) game[k] = d[k]; } const savedLives = localStorage.getItem('lives'); if (savedLives !== null) lives = parseInt(savedLives); const savedNextLife = localStorage.getItem('nextLifeTime'); if (savedNextLife !== 'null' && savedNextLife !== null) nextLifeTime = parseInt(savedNextLife); restoreLivesOverTime(); } catch(e) {}
    game.currentQ = generateMathQuestion();
    botsList = initBots(); refreshBotNames();
    updateCupsAndMedals();
    initMusic(); startMusicOnFirstTouch(); startCheerInterval(); startBotUpdateInterval(); startLifeRestoreChecker();
    renderFull();
    window.addEventListener('beforeunload', () => { stopCheerInterval(); stopBotUpdateInterval(); if (lifeRestoreInterval) clearInterval(lifeRestoreInterval); let toSave = {level:game.level, elo:game.elo, totalCorrect:game.totalCorrect, highestLevel:game.highestLevel, cups:game.cups, medals:game.medals, mathCorrect:game.mathCorrect, winTop3Count:game.winTop3Count}; localStorage.setItem('gameData', JSON.stringify(toSave)); });
}
loadGame();
</script>
</body>
</html>
